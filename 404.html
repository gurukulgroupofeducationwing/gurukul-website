<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Gurukul Group of Education Wing</title>
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dsfgnnpho/image/upload/v1773926805/logo_daoq6o.png">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    .error-section {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 20px;
    }
    .error-code {
      font-family: var(--font-heading);
      font-size: 120px;
      font-weight: 700;
      color: var(--color-accent);
      line-height: 1;
      opacity: 0.12;
      position: absolute;
    }
    .error-content {
      position: relative;
      z-index: 1;
    }
    .error-content img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 24px;
    }
    .error-content h1 {
      font-family: var(--font-heading);
      font-size: 36px;
      color: var(--color-heading);
      margin-bottom: 12px;
    }
    .error-content p {
      color: var(--color-muted);
      font-size: 16px;
      margin-bottom: 32px;
      max-width: 400px;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <section class="error-section">
    <div class="error-code">404</div>
    <div class="error-content">
      <img src="https://res.cloudinary.com/dsfgnnpho/image/upload/v1773926805/logo_daoq6o.png" alt="Gurukul Logo">
      <h1>Page Not Found</h1>
      <p>The page you are looking for does not exist or may have been moved.</p>
      <div class="error-actions">
        <a href="/" class="btn btn-primary">Go to Home</a>
        <a href="/pages/contact.html" class="btn btn-outline">Contact Us</a>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="js/layout.js"></script>
  <script src="js/interactions.js"></script>
</body>
</html>
