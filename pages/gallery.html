<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Photo gallery of events, annual day celebrations and campus at Gurukul Group of Educationl Wing.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://gurukulgroupofeducationwing.netlify.app/pages/gallery.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Gallery | Gurukul Group of Educationl Wing">
  <meta property="og:description" content="Photo gallery of events, annual day celebrations and campus at Gurukul Group of Educationl Wing.">
  <meta property="og:image" content="https://res.cloudinary.com/dsfgnnpho/image/upload/v1773926271/banner1_o61h0v.jpg">
  <meta property="og:url" content="https://gurukulgroupofeducationwing.netlify.app/pages/gallery.html">
  <meta property="og:site_name" content="Gurukul Group of Educationl Wing">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Gallery | Gurukul Group of Educationl Wing">
  <meta name="twitter:description" content="Photo gallery of events, annual day celebrations and campus at Gurukul Group of Educationl Wing.">
  <meta name="twitter:image" content="https://res.cloudinary.com/dsfgnnpho/image/upload/v1774781339/logo_gnkodp.png">
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dsfgnnpho/image/upload/v1774781339/logo_gnkodp.png">
  <link rel="apple-touch-icon" href="https://res.cloudinary.com/dsfgnnpho/image/upload/v1774781339/logo_gnkodp.png">
  <title>Gallery - Gurukul Group of Educationl Wing</title>
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/sections.css">
  <link rel="stylesheet" href="../css/pages.css">
  <link rel="stylesheet" href="../css/footer.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    @keyframes gentleBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      40%       { transform: translateY(-6px) scale(1.02); }
      70%       { transform: translateY(-3px) scale(1.01); }
    }
    .gentle-bounce { animation: gentleBounce 0.5s ease; }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #lightbox.open { display: flex; }

    #lightbox-img {
      max-width: 90vw;
      max-height: 82vh;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      animation: lbFadeIn 0.25s ease;
    }
    @keyframes lbFadeIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }

    #lightbox-caption {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      margin-top: 14px;
      font-family: 'Nunito', sans-serif;
    }

    #lightbox-close {
      position: absolute;
      top: 20px; right: 28px;
      font-size: 32px;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }
    #lightbox-close:hover { color: #fff; }

    .lb-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 36px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      padding: 12px 18px;
      border-radius: 50%;
      transition: background 0.2s, color 0.2s;
      user-select: none;
    }
    .lb-arrow:hover { background: rgba(255,255,255,0.1); color: #fff; }
    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }

    #lb-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }
    .lb-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .lb-dot.active { background: #fff; transform: scale(1.3); }

    #gallery-loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: var(--color-muted);
      font-family: 'Nunito', sans-serif;
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <div class="page-banner">
    <h1>Gallery</h1>
    <p>A glimpse into life at Gurukul Group of Educationl Wing.</p>
    <div class="breadcrumb"><a href="../index.html">Home</a> / Gallery</div>
  </div>

  <section>
      <div class="container">
        <div class="gallery-filters" id="galleryFilters" data-aos="fade-up"></div>
        <div class="gallery-grid" id="galleryGrid">
          <div id="gallery-loading">Loading photos...</div>
        </div>
      </div>
    </section>

  <div id="lightbox">
    <span id="lightbox-close">&times;</span>
    <span class="lb-arrow" id="lb-prev">&#8592;</span>
    <img id="lightbox-img" src="" alt="">
    <span class="lb-arrow" id="lb-next">&#8594;</span>
    <p id="lightbox-caption"></p>
    <div id="lb-counter"></div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="../js/layout.js"></script>
  <script src="../js/interactions.js"></script>
  <script>
    function filterGallery(btn, cat) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.gallery-item').forEach(item => {
        item.style.display = (cat === 'all' || item.dataset.cat === cat) ? 'block' : 'none';
      });
      buildIndex();
    }

    function createGalleryItem(url, cat, alt) {
      const div = document.createElement('div');
      div.className = 'gallery-item';
      div.dataset.cat = cat;
      div.innerHTML = `
        <div style="position:relative;width:100%;height:100%;">
          <div style="position:absolute;inset:0;background:#f1f5f9;display:flex;align-items:center;justify-content:center;z-index:2;">
            <div class="spinner"><div class="dot1"></div><div class="dot2"></div></div>
          </div>
          <img src="${url}" alt="${alt}" loading="lazy" onload="this.previousElementSibling.style.display='none'" style="width:100%;height:100%;object-fit:cover;display:block;position:relative;z-index:1;">
        </div>`;
      return div;
    }

    function buildFilters(images) {
      const filters = document.getElementById('galleryFilters');
      const seen = new Map();
      images.forEach(img => {
        if (img.cat && !seen.has(img.cat)) seen.set(img.cat, img.label || img.cat);
      });

      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn active';
      allBtn.textContent = 'All';
      allBtn.addEventListener('click', () => filterGallery(allBtn, 'all'));
      filters.appendChild(allBtn);

      seen.forEach((label, cat) => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = label;
        btn.addEventListener('click', () => filterGallery(btn, cat));
        filters.appendChild(btn);
      });
    }

    async function loadGallery() {
      const grid = document.getElementById('galleryGrid');
      try {
        const res = await fetch('/api/gallery');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const images = await res.json();
        grid.innerHTML = '';
        if (images && images.length) {
          buildFilters(images);
          images.forEach(img => {
            const cat = img.cat || 'general';
            const alt = img.label || 'Gurukul Gallery';
            const item = createGalleryItem(img.url, cat, alt);
            item.addEventListener('click', () => {
              buildIndex();
              const visible = [...document.querySelectorAll('.gallery-item')]
                .filter(el => el.style.display !== 'none');
              openLightbox(visible.indexOf(item));
            });
            grid.appendChild(item);
          });
        } else {
          grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--color-muted);padding:40px 0;">No images found.</p>';
        }
        buildIndex();
      } catch (e) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--color-muted);padding:40px 0;">Could not load gallery. Please try again.</p>';
        console.warn('Gallery function error:', e);
      }
    }

    let currentIndex = 0;
    let visibleItems = [];

    function buildIndex() {
      visibleItems = [...document.querySelectorAll('.gallery-item')]
        .filter(el => el.style.display !== 'none');
    }

    function getVisibleImg(i) {
      const img = visibleItems[i]?.querySelector('img');
      return { src: img?.src || '', alt: img?.alt || '' };
    }

    function openLightbox(index) {
      currentIndex = index;
      const { src, alt } = getVisibleImg(currentIndex);
      const lbImg = document.getElementById('lightbox-img');
      lbImg.src = src;
      lbImg.alt = alt;
      document.getElementById('lightbox-caption').textContent = alt;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
      buildDots();
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      currentIndex = (currentIndex + dir + visibleItems.length) % visibleItems.length;
      const lbImg = document.getElementById('lightbox-img');
      lbImg.style.animation = 'none';
      lbImg.offsetHeight;
      lbImg.style.animation = 'lbFadeIn 0.2s ease';
      const { src, alt } = getVisibleImg(currentIndex);
      lbImg.src = src;
      lbImg.alt = alt;
      document.getElementById('lightbox-caption').textContent = alt;
      buildDots();
    }

    function buildDots() {
      const counter = document.getElementById('lb-counter');
      counter.innerHTML = '';
      visibleItems.forEach((_, i) => {
        const dot = document.createElement('span');
        dot.className = 'lb-dot' + (i === currentIndex ? ' active' : '');
        dot.onclick = () => { currentIndex = i; navigate(0); };
        counter.appendChild(dot);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadGallery();

      document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
      document.getElementById('lb-prev').addEventListener('click', () => navigate(-1));
      document.getElementById('lb-next').addEventListener('click', () => navigate(1));

      document.getElementById('lightbox').addEventListener('click', (e) => {
        if (e.target === document.getElementById('lightbox')) closeLightbox();
      });

      document.addEventListener('keydown', (e) => {
        if (!document.getElementById('lightbox').classList.contains('open')) return;
        if (e.key === 'ArrowRight') navigate(1);
        if (e.key === 'ArrowLeft') navigate(-1);
        if (e.key === 'Escape') closeLightbox();
      });

      document.getElementById('lightbox').addEventListener('wheel', (e) => {
        e.preventDefault();
        navigate(e.deltaY > 0 ? 1 : -1);
      }, { passive: false });
    });
  </script>
</body>
</html>
