  <style>
    @keyframes gentleBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      40%       { transform: translateY(-6px) scale(1.02); }
      70%       { transform: translateY(-3px) scale(1.01); }
    }
    .gentle-bounce { animation: gentleBounce 0.5s ease; }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #lightbox.open { display: flex; }

    #lightbox-img {
      max-width: 90vw;
      max-height: 82vh;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      animation: lbFadeIn 0.25s ease;
    }
    @keyframes lbFadeIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }

    #lightbox-caption {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      margin-top: 14px;
      font-family: 'Nunito', sans-serif;
    }

    #lightbox-close {
      position: absolute;
      top: 20px; right: 28px;
      font-size: 32px;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }
    #lightbox-close:hover { color: #fff; }

    .lb-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 36px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      padding: 12px 18px;
      border-radius: 50%;
      transition: background 0.2s, color 0.2s;
      user-select: none;
    }
    .lb-arrow:hover { background: rgba(255,255,255,0.1); color: #fff; }
    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }

    #lb-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }
    .lb-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .lb-dot.active { background: #fff; transform: scale(1.3); }
  </style>

  <!-- Lightbox -->
  <div id="lightbox">
    <span id="lightbox-close">&times;</span>
    <span class="lb-arrow" id="lb-prev">&#8592;</span>
    <img id="lightbox-img" src="" alt="">
    <span class="lb-arrow" id="lb-next">&#8594;</span>
    <p id="lightbox-caption"></p>
    <div id="lb-counter"></div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="../js/layout.js"></script>
  <script src="../js/interactions.js"></script>
  <script>
    function filterGallery(btn, cat) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.gallery-item').forEach(item => {
        item.style.display = (cat === 'all' || item.dataset.cat === cat) ? 'block' : 'none';
      });
      buildIndex();
    }

    function createGalleryItem(url, cat, alt) {
      const div = document.createElement('div');
      div.className = 'gallery-item';
      div.dataset.cat = cat;
      div.innerHTML = `
        <div style="position:relative;width:100%;height:100%;">
          <div style="position:absolute;inset:0;background:#f1f5f9;display:flex;align-items:center;justify-content:center;z-index:2;">
            <div class="spinner"><div class="dot1"></div><div class="dot2"></div></div>
          </div>
          <img src="${url}" alt="${alt}" loading="lazy" onload="this.previousElementSibling.style.display='none'" style="width:100%;height:100%;object-fit:cover;display:block;position:relative;z-index:1;">
        </div>`;
      return div;
    }

    async function loadGallery() {
      const grid = document.getElementById('galleryGrid');
      try {
        const res = await fetch('/.netlify/functions/gallery');
        const images = await res.json();
        grid.innerHTML = '';
        if (images && images.length) {
          images.forEach(img => {
            const cat = img.cat || 'general';
            const alt = img.label || 'Gurukul Gallery';
            const item = createGalleryItem(img.url, cat, alt);
            item.addEventListener('click', () => {
              buildIndex();
              const visible = [...document.querySelectorAll('.gallery-item')]
                .filter(el => el.style.display !== 'none');
              openLightbox(visible.indexOf(item));
            });
            grid.appendChild(item);
          });
        } else {
          grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--color-muted);padding:40px 0;">No images found.</p>';
        }
        buildIndex();
      } catch (e) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--color-muted);padding:40px 0;">Could not load gallery. Please try again.</p>';
        console.warn('Gallery function error:', e);
      }
    }

    let currentIndex = 0;
    let visibleItems = [];

    function buildIndex() {
      visibleItems = [...document.querySelectorAll('.gallery-item')]
        .filter(el => el.style.display !== 'none');
    }

    function getVisibleImg(i) {
      const img = visibleItems[i]?.querySelector('img');
      return { src: img?.src || '', alt: img?.alt || '' };
    }

    function openLightbox(index) {
      currentIndex = index;
      const { src, alt } = getVisibleImg(currentIndex);
      const lbImg = document.getElementById('lightbox-img');
      lbImg.src = src;
      lbImg.alt = alt;
      document.getElementById('lightbox-caption').textContent = alt;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
      buildDots();
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      currentIndex = (currentIndex + dir + visibleItems.length) % visibleItems.length;
      const lbImg = document.getElementById('lightbox-img');
      lbImg.style.animation = 'none';
      lbImg.offsetHeight;
      lbImg.style.animation = 'lbFadeIn 0.2s ease';
      const { src, alt } = getVisibleImg(currentIndex);
      lbImg.src = src;
      lbImg.alt = alt;
      document.getElementById('lightbox-caption').textContent = alt;
      buildDots();
    }

    function buildDots() {
      const counter = document.getElementById('lb-counter');
      counter.innerHTML = '';
      visibleItems.forEach((_, i) => {
        const dot = document.createElement('span');
        dot.className = 'lb-dot' + (i === currentIndex ? ' active' : '');
        dot.onclick = () => { currentIndex = i; navigate(0); };
        counter.appendChild(dot);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      buildIndex();

      document.querySelectorAll('.gallery-item').forEach(item => {
        item.addEventListener('click', () => {
          buildIndex();
          const visible = [...document.querySelectorAll('.gallery-item')]
            .filter(el => el.style.display !== 'none');
          openLightbox(visible.indexOf(item));
        });
      });

      document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
      document.getElementById('lb-prev').addEventListener('click', () => navigate(-1));
      document.getElementById('lb-next').addEventListener('click', () => navigate(1));

      document.getElementById('lightbox').addEventListener('click', (e) => {
        if (e.target === document.getElementById('lightbox')) closeLightbox();
      });

      document.addEventListener('keydown', (e) => {
        if (!document.getElementById('lightbox').classList.contains('open')) return;
        if (e.key === 'ArrowRight') navigate(1);
        if (e.key === 'ArrowLeft') navigate(-1);
        if (e.key === 'Escape') closeLightbox();
      });

      document.getElementById('lightbox').addEventListener('wheel', (e) => {
        e.preventDefault();
        navigate(e.deltaY > 0 ? 1 : -1);
      }, { passive: false });
    });
  </script>
